<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flex Loan Manager Bot</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#0f1923;--bg-secondary:#1a2736;--bg-card:#1e2f40;--bg-card-hover:#243a4e;
--text-primary:#e8edf2;--text-secondary:#8899aa;--text-muted:#5a6a7a;
--accent-blue:#3b82f6;--accent-green:#22c55e;--accent-yellow:#eab308;
--accent-orange:#f97316;--accent-red:#ef4444;--accent-purple:#a855f7;
--border-color:#2a3a4a;--shadow:0 4px 24px rgba(0,0,0,0.3);
}
body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg-primary)}::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:4px}
.header{background:linear-gradient(135deg,#0c1520 0%,#1a2d42 100%);border-bottom:1px solid var(--border-color);padding:20px 32px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.brand{display:flex;align-items:center;gap:14px}
.brand-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff}
.brand h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.brand-sub{font-size:12px;color:var(--text-secondary);font-weight:500;text-transform:uppercase;letter-spacing:1px}
.header-actions{display:flex;gap:8px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent-blue);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-secondary{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color)}.btn-secondary:hover{background:var(--bg-card-hover)}
.btn-success{background:var(--accent-green);color:#fff}
.search-bar{display:flex;gap:10px;align-items:center}
.search-input{flex:1;min-width:280px;padding:12px 18px;background:var(--bg-card);border:2px solid var(--border-color);border-radius:10px;color:var(--text-primary);font-size:15px;font-family:inherit;font-weight:500;transition:border-color .2s}
.search-input:focus{outline:none;border-color:var(--accent-blue)}
.search-input::placeholder{color:var(--text-muted)}
.btn-lookup{padding:12px 28px;font-size:15px;border-radius:10px}
.spinner{display:none;width:20px;height:20px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.main{padding:24px 32px;max-width:1600px;margin:0 auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;color:var(--text-secondary)}
.empty-state i{font-size:64px;margin-bottom:20px;opacity:.3}
.empty-state h2{font-size:24px;margin-bottom:8px;color:var(--text-primary);opacity:.6}
.empty-state p{font-size:14px;max-width:400px}
.dashboard{display:none}
.section{margin-bottom:28px}
.section-title{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--text-primary)}
.section-title i{color:var(--accent-blue);font-size:14px}
.cards-row{display:grid;gap:12px}
.cards-7{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.cards-5{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.cards-4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.cards-3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:16px;transition:all .2s}
.card:hover{border-color:rgba(59,130,246,0.3)}
.card-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);margin-bottom:6px}
.card-value{font-size:20px;font-weight:700;color:var(--text-primary)}
.card-value.small{font-size:16px}
.badge{display:inline-flex;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.5px}
.badge-green{background:rgba(34,197,94,.15);color:#4ade80}
.badge-blue{background:rgba(59,130,246,.15);color:#60a5fa}
.badge-yellow{background:rgba(234,179,8,.15);color:#facc15}
.badge-orange{background:rgba(249,115,22,.15);color:#fb923c}
.badge-red{background:rgba(239,68,68,.15);color:#f87171}
.badge-gray{background:rgba(100,116,139,.15);color:#94a3b8}
.badge-large{font-size:22px;padding:8px 20px}
.table-wrap{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse}
.table-wrap th{background:var(--bg-secondary);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-secondary);border-bottom:1px solid var(--border-color)}
.table-wrap td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(42,58,74,.5);font-weight:500}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tbody tr{cursor:pointer;transition:background .15s}
.table-wrap tbody tr:hover{background:var(--bg-card-hover)}
.table-wrap tbody tr.selected{background:rgba(59,130,246,.1);border-left:3px solid var(--accent-blue)}
.chart-container{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:20px;position:relative}
.chart-row{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start}
.chart-full{width:100%}
.donut-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-wrap canvas{max-width:240px;max-height:240px}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px}
.metric-card{background:var(--bg-secondary);border-radius:8px;padding:12px;text-align:center}
.metric-card .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-secondary);margin-bottom:4px}
.metric-card .value{font-size:16px;font-weight:700}
.alerts-container{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.alert-banner{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.alert-red{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.alert-yellow{background:rgba(234,179,8,.15);color:#facc15;border:1px solid rgba(234,179,8,.3)}
.alert-green{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.projection-card{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;padding:20px}
.proj-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(42,58,74,.5);font-size:13px}
.proj-row:last-child{border-bottom:none}
.proj-label{color:var(--text-secondary);font-weight:500}
.proj-value{font-weight:700}
.timeline-bar{height:24px;background:var(--bg-secondary);border-radius:12px;overflow:hidden;margin-top:16px;position:relative}
.timeline-fill{height:100%;border-radius:12px;transition:width 1s ease;position:relative}
.timeline-fill::after{content:attr(data-label);position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
.trend-up{color:var(--accent-green)}.trend-down{color:var(--accent-red)}.trend-stable{color:var(--accent-yellow)}
.linked-token{color:var(--accent-blue);cursor:pointer;text-decoration:none;font-family:monospace;font-size:12px;font-weight:600;transition:color .2s}
.linked-token:hover{color:#60a5fa;text-decoration:underline}
.linked-empty{display:flex;align-items:center;justify-content:center;padding:32px;color:var(--text-muted);font-size:14px;gap:10px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px}
.linked-empty i{font-size:18px;opacity:.5}
.linked-row{transition:background .15s}
.linked-row:hover{background:var(--bg-card-hover)}
.linked-count{display:inline-flex;align-items:center;justify-content:center;background:rgba(59,130,246,.15);color:#60a5fa;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:700}

/* Eligibility Section Styles */
.eligibility-container{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;overflow:hidden}
.eligibility-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--border-color);background:var(--bg-secondary)}
.eligibility-summary{display:flex;align-items:center;gap:12px}
.eligibility-summary .count-badge{font-size:14px;font-weight:700;padding:6px 14px;border-radius:8px}
.eligibility-summary .count-badge.has-failures{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.eligibility-summary .count-badge.all-pass{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.eligibility-summary .summary-text{font-size:13px;color:var(--text-secondary);font-weight:500}
.eligibility-toggle{display:flex;background:var(--bg-primary);border-radius:8px;overflow:hidden;border:1px solid var(--border-color)}
.eligibility-toggle button{padding:7px 16px;font-size:12px;font-weight:600;font-family:inherit;border:none;cursor:pointer;transition:all .2s;color:var(--text-secondary);background:transparent}
.eligibility-toggle button.active{background:var(--accent-blue);color:#fff}
.eligibility-toggle button:hover:not(.active){background:var(--bg-card-hover);color:var(--text-primary)}
.elig-category{border-bottom:1px solid var(--border-color)}
.elig-category:last-child{border-bottom:none}
.elig-category-header{padding:12px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;user-select:none}
.elig-category-header:hover{background:var(--bg-card-hover)}
.elig-category-header .cat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.elig-category-header .cat-icon.cat-account{background:rgba(59,130,246,.15);color:#60a5fa}
.elig-category-header .cat-icon.cat-processing{background:rgba(168,85,247,.15);color:#c084fc}
.elig-category-header .cat-icon.cat-slumps{background:rgba(249,115,22,.15);color:#fb923c}
.elig-category-header .cat-icon.cat-chargebacks{background:rgba(239,68,68,.15);color:#f87171}
.elig-category-header .cat-icon.cat-loans{background:rgba(234,179,8,.15);color:#facc15}
.elig-category-header .cat-icon.cat-business{background:rgba(34,197,94,.15);color:#4ade80}
.elig-category-header .cat-name{font-size:14px;font-weight:600;flex:1}
.elig-category-header .cat-stats{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600}
.elig-category-header .cat-stats .pass-count{color:#4ade80}
.elig-category-header .cat-stats .fail-count{color:#f87171}
.elig-category-header .cat-chevron{color:var(--text-muted);transition:transform .2s;font-size:12px}
.elig-category-header .cat-chevron.open{transform:rotate(180deg)}
.elig-category-body{padding:0 20px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease}
.elig-category-body.open{max-height:2000px;padding:4px 20px 16px}
.elig-rule{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid rgba(42,58,74,.3)}
.elig-rule:last-child{border-bottom:none}
.elig-rule .rule-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.elig-rule .rule-icon.pass{background:rgba(34,197,94,.15);color:#4ade80}
.elig-rule .rule-icon.fail{background:rgba(239,68,68,.2);color:#f87171}
.elig-rule .rule-content{flex:1;min-width:0}
.elig-rule .rule-key{font-size:11px;font-family:monospace;color:var(--text-muted);margin-bottom:2px;word-break:break-all}
.elig-rule .rule-desc{font-size:13px;font-weight:500;color:var(--text-primary);line-height:1.4}
.elig-rule .rule-desc.fail-desc{color:#f87171}
.elig-no-failures{padding:20px;text-align:center;color:var(--text-muted);font-size:13px}
.elig-category-body .no-items-msg{padding:12px 0;font-size:13px;color:var(--text-muted);font-style:italic}

/* CROP Section Styles */
.crop-outer{background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;overflow:hidden}
.crop-main-header{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .15s;background:linear-gradient(135deg,#162538 0%,#1a3050 100%);border-bottom:1px solid var(--border-color)}
.crop-main-header:hover{background:linear-gradient(135deg,#1a2d42 0%,#1e3858 100%)}
.crop-main-header .crop-icon{width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#2563eb,#1d4ed8);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0}
.crop-main-header .crop-title-wrap{flex:1}
.crop-main-header .crop-title{font-size:15px;font-weight:700;color:var(--text-primary)}
.crop-main-header .crop-subtitle{font-size:11px;color:var(--text-secondary);font-weight:500;margin-top:2px}
.crop-main-header .crop-chevron{color:var(--text-muted);font-size:14px;transition:transform .25s}
.crop-main-header .crop-chevron.open{transform:rotate(180deg)}
.crop-body{max-height:0;overflow:hidden;transition:max-height .4s ease}
.crop-body.open{max-height:50000px}
.crop-search-bar{padding:12px 20px;background:var(--bg-secondary);border-bottom:1px solid var(--border-color);display:flex;gap:10px;align-items:center}
.crop-search-input{flex:1;padding:9px 14px;background:var(--bg-primary);border:1px solid var(--border-color);border-radius:8px;color:var(--text-primary);font-size:13px;font-family:inherit;font-weight:500;transition:border-color .2s}
.crop-search-input:focus{outline:none;border-color:var(--accent-blue)}
.crop-search-input::placeholder{color:var(--text-muted)}
.crop-search-count{font-size:11px;color:var(--text-muted);font-weight:600;white-space:nowrap}
.crop-subsection{border-bottom:1px solid var(--border-color)}
.crop-subsection:last-child{border-bottom:none}
.crop-subsection.hidden{display:none}
.crop-sub-header{padding:11px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .15s}
.crop-sub-header:hover{background:var(--bg-card-hover)}
.crop-sub-header .sub-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.crop-sub-header .sub-icon.si-blockers{background:rgba(239,68,68,.12);color:#f87171}
.crop-sub-header .sub-icon.si-linked{background:rgba(59,130,246,.12);color:#60a5fa}
.crop-sub-header .sub-icon.si-processing{background:rgba(168,85,247,.12);color:#c084fc}
.crop-sub-header .sub-icon.si-compliance{background:rgba(234,179,8,.12);color:#facc15}
.crop-sub-header .sub-icon.si-aan{background:rgba(249,115,22,.12);color:#fb923c}
.crop-sub-header .sub-icon.si-escalation{background:rgba(34,197,94,.12);color:#4ade80}
.crop-sub-header .sub-icon.si-sla{background:rgba(56,189,248,.12);color:#38bdf8}
.crop-sub-header .sub-icon.si-threshold{background:rgba(244,114,182,.12);color:#f472b6}
.crop-sub-header .sub-name{font-size:13px;font-weight:600;flex:1;color:var(--text-primary)}
.crop-sub-header .sub-count{font-size:11px;color:var(--text-muted);font-weight:500}
.crop-sub-header .sub-chevron{color:var(--text-muted);font-size:11px;transition:transform .2s}
.crop-sub-header .sub-chevron.open{transform:rotate(180deg)}
.crop-sub-body{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;padding:0 20px}
.crop-sub-body.open{max-height:8000px;padding:8px 20px 16px}
.crop-item{padding:10px 12px;border-radius:8px;margin-bottom:6px;background:var(--bg-secondary);border:1px solid rgba(42,58,74,.5);transition:all .15s}
.crop-item:last-child{margin-bottom:0}
.crop-item.hidden{display:none}
.crop-item:hover{border-color:rgba(59,130,246,.25)}
.crop-item-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.crop-item-title .ci-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.ci-tag-decline{background:rgba(239,68,68,.15);color:#f87171}
.ci-tag-escalate{background:rgba(234,179,8,.15);color:#facc15}
.ci-tag-approve{background:rgba(34,197,94,.15);color:#4ade80}
.ci-tag-review{background:rgba(59,130,246,.15);color:#60a5fa}
.ci-tag-wait{background:rgba(168,85,247,.15);color:#c084fc}
.crop-item-desc{font-size:12px;color:var(--text-secondary);line-height:1.5;font-weight:400}
.crop-item-desc strong{color:var(--text-primary);font-weight:600}
.crop-item-desc .hl{color:var(--accent-blue);font-weight:600}
.crop-item-desc .warn{color:#fb923c;font-weight:600}
.crop-item-desc .danger{color:#f87171;font-weight:600}
.crop-item-desc .ok{color:#4ade80;font-weight:600}
.crop-esc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.crop-esc-card{background:var(--bg-secondary);border:1px solid rgba(42,58,74,.5);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color .15s}
.crop-esc-card:hover{border-color:rgba(59,130,246,.3)}
.crop-esc-card .esc-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.crop-esc-card .esc-icon.esc-lead{background:rgba(59,130,246,.12);color:#60a5fa}
.crop-esc-card .esc-icon.esc-slack{background:rgba(168,85,247,.12);color:#c084fc}
.crop-esc-card .esc-info .esc-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.crop-esc-card .esc-info .esc-value{font-size:13px;font-weight:600;color:var(--text-primary);margin-top:1px}
.crop-aan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.crop-aan-item{background:var(--bg-secondary);border:1px solid rgba(42,58,74,.5);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.crop-aan-item i{color:var(--accent-orange);font-size:10px}
.crop-aan-item.hidden{display:none}
.crop-sla-table{width:100%;border-collapse:collapse}
.crop-sla-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-secondary);background:var(--bg-primary);border-bottom:1px solid var(--border-color)}
.crop-sla-table td{padding:8px 12px;font-size:13px;font-weight:500;border-bottom:1px solid rgba(42,58,74,.4)}
.crop-sla-table tr:last-child td{border-bottom:none}
.crop-threshold-table{width:100%;border-collapse:collapse}
.crop-threshold-table th{text-align:left;padding:8px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-secondary);background:var(--bg-primary);border-bottom:1px solid var(--border-color)}
.crop-threshold-table td{padding:8px 12px;font-size:13px;font-weight:500;border-bottom:1px solid rgba(42,58,74,.4)}
.crop-threshold-table tr:last-child td{border-bottom:none}
.crop-threshold-table .tier-badge{display:inline-flex;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.3px}
.tier-standard{background:rgba(34,197,94,.12);color:#4ade80}
.tier-full{background:rgba(59,130,246,.12);color:#60a5fa}
.tier-enhanced{background:rgba(234,179,8,.12);color:#facc15}
.tier-max{background:rgba(239,68,68,.12);color:#f87171}
mark{background:rgba(59,130,246,.25);color:var(--text-primary);border-radius:2px;padding:0 2px}

@media(max-width:900px){
.header{padding:16px}.main{padding:16px}.search-bar{flex-wrap:wrap}.search-input{min-width:200px}
.chart-row{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}.cards-7,.cards-5,.cards-4{grid-template-columns:repeat(2,1fr)}
.eligibility-header{flex-direction:column;align-items:flex-start}

# Flex Loan Manager Bot — Internal Tool

## Overview
An internal operations tool for Square Capital teams to look up a merchant by their **Unit Token** and view a comprehensive dashboard of their Flex Loan performance, GPV trends, repayment progress, risk grade, business health signals, loan eligibility, linked accounts, and **Credit Review Operating Procedures (CROP)** reference.

## Design
- Dark professional theme with a modern dashboard feel (dark navy/charcoal background, accent colors for status)
- Clean card-based layout with clear sections
- Charts using Chart.js for GPV trends and repayment progress
- Responsive layout

## Layout & Sections (in order)

### Header
- Title: "Flex Loan Manager Bot" with Square Capital branding
- Subtitle: "Internal Operations Tool"
- Search bar: Large prominent input for **Unit Token** with a "Look Up" button
- Loading spinner when fetching data

### Mock Data
Realistic mock data generated deterministically from token string via seeded PRNG. ~75% of tokens have active loans; ~25% have no active offer (triggering eligibility view).

### Section 1: Merchant Overview (top row of cards)
- Merchant Name, Unit Token, Risk Grade (colored badge), Merchant Status, Business Category, Days Since Activation, Country

### Section 2: Active Flex Loans (table)
- Table showing all active flex loans immediately after Merchant Overview
- Columns: Plan Group ID, Status, Financed, Fee, Receivables, Hold Rate, Risk, Activated, Origination
- Color-coded status badges
- Clicking a row selects it and updates Repayment Progress below
- If NO active loans exist, shows "No Active Flex Loans" message and directs to Loan Eligibility section

### Section 3: Loan Eligibility (shown when NO active offer)
- Appears only when the merchant has no active Flex Loan offer
- Shows a comprehensive checklist of 44 eligibility rules organized into 6 categories
- Summary header: "X of 44 eligibility checks failed" with red/green indicator
- Toggle between "Failed Only" (default) and "All Checks" views
- Collapsible category groups with pass/fail counts per category
- Categories with failures auto-expand; others start collapsed

**Categories and Rules:**
1. **Account Standing** (7 rules)
2. **Processing Activity** (9 rules)
3. **Business Health Slumps** (4 rules)
4. **Chargeback & Disputes** (4 rules)
5. **Existing Loan Status** (11 rules)
6. **Business Type & Limits** (9 rules)

### Section 4: Credit Review Reference (CROP) — NEW
A collapsible reference section for Credit Analysts during manual review. Defaults to **collapsed**. Contains a keyword search bar and 8 collapsible subsections:

1. **Application Blockers Quick Reference** (20 blockers) — Searchable/filterable list of all manual review blockers with procedures, tagged as Decline/Review/Escalate/Wait/Approve
2. **Linked Account Review (Section 7.3)** (4 procedures) — Guidance for reviewing connected user graph: Negative Balance, Frozen/Deactivated, Bankruptcy, Evasion
3. **Processing Activity Checks (Section 7.4)** (7 procedures) — Risk Score Exceeded, Large $ Outliers, Non-Seasonal Gaps, Seasonal Gaps, Bank Change, Refunds/Chargebacks, Failed Debits
4. **Compliance Checks (Section 7.7)** (5 procedures) — Cash Advancing, Prepaid/Gift Card Abuse, Open LegitScript, CBD, Firearms
5. **Adverse Action Notices (AANs)** (19 notices) — Quick reference grid of all AAN types
6. **Escalation Channels** (9 channels) — Contact cards for Pre-Origination Lead, ATO, Compliance, Credit Risk, Customer Success, Fraud Ops, Loan App Review, Recovery, CBD
7. **SLA Reference** (3 SLAs) — Table with internal/external SLAs for New Applications, SSP Responses, Complaints
8. **Loan Size Thresholds** (4 tiers) — Table with review requirements per tier: Standard (≤$10K), Full CROP ($10K-$75K), Enhanced ($75K-$250K), Maximum (>$250K)

**CROP Features:**
- Entire section collapsible with blue/navy gradient header
- Each subsection independently collapsible with chevron icons
- Search bar at top filters all procedures/items by keyword
- Search shows match count and auto-expands matching subsections
- Color-coded action tags (Decline=red, Escalate=yellow, Approve=green, Review=blue, Wait=purple)
- Styled consistently with the dark dashboard theme

### Section 5: Linked Accounts with Active Loans
- Table of linked unit tokens with clickable navigation
- Shows business name, location, active loan count, total financed, status, risk grade
- 0-3 linked accounts per token

### Section 6: Repayment Progress (selected loan — only shown with active loans)
- Donut chart + repayment curve line chart
- Key metrics: Total Receivables, Cumulative Repaid, Outstanding, Repayment Fraction, Days Active, Est. Duration, Projected Payoff

### Section 7: GPV Trends
- Daily GPV line chart (180 days) with 30-day rolling average
- Anomaly highlighting (spikes/drops)
- Summary cards: Last 30/90 Days GPV, Avg Daily, Trend, Projected Monthly

### Section 8: Business Health Signals
- Alert flags (colored banners) — includes "NO ACTIVE OFFER" alert when applicable
- Chargeback summary cards and monthly stacked bar chart

### Section 9: Projected Loan Payoff (only shown with active loans)
- Repayment pace, projected payoff dates (current, +10%, -20%)
- Visual timeline progress bar

## Interactions
- Token lookup generates all mock data and renders full dashboard
- Clicking linked account loads that account's dashboard
- Clicking loan row updates Repayment Progress
- Eligibility toggle switches between Failed Only / All Checks views
- Category headers collapse/expand rule lists
- CROP section: main toggle, subsection toggles, keyword search with auto-expand
- Copy Report includes eligibility failures when no active loans
- All charts animate on load with hover tooltips

## Technical Notes
- Chart.js (CDN) for all charts
- Seeded PRNG for deterministic data
- Entirely client-side, no backend
- Font Awesome icons, Inter font from Google Fonts

// Seeded PRNG
class SeededRNG{constructor(s){this.seed=this.hashStr(s)}hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)||1}next(){this.seed^=this.seed<<13;this.seed^=this.seed>>17;this.seed^=this.seed<<5;return(this.seed>>>0)/4294967296}range(a,b){return a+this.next()*(b-a)}int(a,b){return Math.floor(this.range(a,b+1))}pick(arr){return arr[this.int(0,arr.length-1)]}shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=this.int(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}}

const lastNames=['Bakery','Bistro','Café','Deli','Kitchen','Market','Boutique','Studio','Workshop','Goods','Supply','Trading','Provisions','Mercantile','Emporium','Collective','Co','Shop','House','Place'];
const categories=['Food & Beverage','Retail','Health & Beauty','Professional Services','Home & Repair','Entertainment','Fitness & Wellness','Automotive','Education','Technology'];
const statuses=['originated','allocated','originated','allocated','closed','originated'];
const origTypes=['flex_loan','flex_loan_plus','flex_loan'];

function getAllRuleKeys(){
const keys=[];
for(const cat of Object.values(ELIGIBILITY_RULES)){for(const rule of cat.rules){keys.push(rule.key)}}
return keys;
}

function generateEligibilityData(token, hasActiveLoans){
const r=new SeededRNG(token+'_eligibility_v3');
const allKeys=getAllRuleKeys();
const failedKeys=new Set();
if(!hasActiveLoans){
  const numFails=r.int(1,4);
  const shuffled=r.shuffle([...allKeys]);
  for(let i=0;i<numFails;i++){failedKeys.add(shuffled[i])}
}
const results={};
for(const [catName,catData] of Object.entries(ELIGIBILITY_RULES)){
  results[catName]={icon:catData.icon,cssClass:catData.cssClass,rules:[]};
  for(const rule of catData.rules){
    results[catName].rules.push({key:rule.key,desc:rule.desc,passed:!failedKeys.has(rule.key)});
  }
}
return {results,totalRules:allKeys.length,failedCount:failedKeys.size};
}

function generateLinkedToken(rng){
const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
let token='';for(let i=0;i<13;i++){token+=chars[rng.int(0,chars.length-1)]}return token;
}

function generateLinkedAccounts(token){
const r=new SeededRNG(token+'_linked_accounts_v2');
const numLinked=r.int(0,3);const linked=[];
for(let i=0;i<numLinked;i++){
const linkedToken=generateLinkedToken(r);
if(linkedToken===token)continue;
const lr=new SeededRNG(linkedToken);
const bizName=lr.pick(firstNames)+' '+lr.pick(lastNames);
const locationName=bizName+' — '+r.pick(locationSuffixes);
const numActiveLoans=r.int(1,3);
let totalFinanced=0;const loanStatuses=[];
for(let j=0;j<numActiveLoans;j++){totalFinanced+=r.int(5000,100000)*100;loanStatuses.push(r.pick(['originated','allocated']))}
const riskGrades=['A','A','B','B','B','C','C','D'];
const risk=r.pick(riskGrades);
linked.push({unitToken:linkedToken,businessName:bizName,locationName:locationName,activeLoanCount:numActiveLoans,totalFinanced:totalFinanced,status:loanStatuses[0],risk:risk});
}
return linked;
}

function generateData(token){
const r=new SeededRNG(token);
const merchantName=r.pick(firstNames)+' '+r.pick(lastNames);
const riskGrades=['A','A','B','B','B','C','C','D','F'];
const merchantRisk=r.pick(riskGrades);
const isActive=r.next()>0.1;
const category=r.pick(categories);
const daysActive=r.int(120,1800);
const activationDate=addDays(new Date(),-daysActive);
const hasActiveOfferRoll=r.next();
const hasActiveLoans=hasActiveOfferRoll>0.25;
const numLoans=hasActiveLoans?r.int(1,4):0;
const loans=[];
for(let i=0;i<numLoans;i++){
const financed=r.int(5000,100000)*100;
const feeRate=r.range(0.05,0.15);
const fee=Math.round(financed*feeRate);
const receivables=financed+fee;
const holdRate=r.int(500,2000);
const loanRisk=r.pick(['A','B','B','C','C','D']);
const loanStatus=i===0?r.pick(['originated','allocated']):r.pick(statuses);
const loanDaysAgo=r.int(30,Math.min(daysActive,600));
const loanActivated=addDays(new Date(),-loanDaysAgo);
const repayFrac=loanStatus==='closed'?1:r.range(0.1,0.85);
const cumRepaid=Math.round(receivables*repayFrac);
const estDuration=r.int(180,540);
const planId='PG'+token.substring(0,4)+r.int(1000,9999);
loans.push({planId,status:loanStatus,financed,fee,receivables,holdRate,risk:loanRisk,activated:loanActivated,daysAgo:loanDaysAgo,origType:r.pick(origTypes),repayFrac,cumRepaid,outstanding:receivables-cumRepaid,estDuration});
}
const baseGPV=r.range(500,5000);const gpvData=[];const today=new Date();
for(let i=179;i>=0;i--){
const date=addDays(today,-i);
const seasonal=1+0.2*Math.sin((i/30)*Math.PI);
const trend=1+(r.next()-0.48)*0.02;
const noise=r.range(0.4,1.8);
gpvData.push({date,value:Math.max(0,baseGPV*seasonal*trend*noise)});
}
const cbData=[];const baseRate=r.range(0.003,0.035);
for(let i=11;i>=0;i--){
const month=new Date(today.getFullYear(),today.getMonth()-i,1);
const totalPayments=r.int(80,400);
const cbCount=Math.max(0,Math.round(totalPayments*baseRate*r.range(0.3,2.5)));
const won=Math.round(cbCount*r.range(0.3,0.7));
const lost=Math.round((cbCount-won)*r.range(0.4,0.8));
const pending=cbCount-won-lost;
const avgAmount=r.range(20,200);
cbData.push({month,total:cbCount,won:Math.max(0,won),lost:Math.max(0,lost),pending:Math.max(0,pending),amount:cbCount*avgAmount,totalPayments});
}
return{merchantName,token,risk:merchantRisk,isActive,category,daysActive,activationDate,loans,gpvData,cbData,linkedAccounts:generateLinkedAccounts(token),hasActiveLoans,eligibility:generateEligibilityData(token,hasActiveLoans)};
}

function renderEligibilitySection(){

<div class="cat-icon ${catData.cssClass}"><i class="${catData.icon}"></i></div>

<div class="cat-stats">${failedInCat.length>0?'<span class="fail-count"><i class="fas fa-times"></i> '+failedInCat.length+' failed</span>':''}<span class="pass-count"><i class="fas fa-check"></i> ${passedInCat.length} passed</span></div>
<i class="fas fa-chevron-down cat-chevron ${isOpen?'open':''}" id="elig-chev-${catId}"></i>
</div><div class="elig-category-body ${isOpen?'open':''}" id="elig-body-${catId}">`;
if(rulesToShow.length===0){html+=`<div class="no-items-msg">No failed checks in this category</div>`}
else{for(const rule of rulesToShow){
const icon=rule.passed?'<div class="rule-icon pass"><i class="fas fa-check"></i></div>':'<div class="rule-icon fail"><i class="fas fa-times"></i></div>';

}

}

function toggleCropMain(){
cropMainOpen=!cropMainOpen;
const body=document.getElementById('cropBody');
const chev=document.getElementById('cropMainChevron');
if(body){body.classList.toggle('open',cropMainOpen)}
if(chev){chev.classList.toggle('open',cropMainOpen)}
}

function toggleCropSub(key){
cropSubStates[key]=!cropSubStates[key];
const body=document.getElementById('crop-sub-body-'+key);
const chev=document.getElementById('crop-sub-chev-'+key);
if(body){body.classList.toggle('open',cropSubStates[key])}
if(chev){chev.classList.toggle('open',cropSubStates[key])}
}

function cropSearch(val){
cropSearchTerm=val.toLowerCase().trim();
const container=document.getElementById('cropBody');
if(!container)return;
const subsections=container.querySelectorAll('.crop-subsection');
const items=container.querySelectorAll('.crop-item');
const aanItems=container.querySelectorAll('.crop-aan-item');
let totalVisible=0;

if(!cropSearchTerm){
  subsections.forEach(s=>s.classList.remove('hidden'));
  items.forEach(i=>i.classList.remove('hidden'));
  aanItems.forEach(i=>i.classList.remove('hidden'));
  const countEl=document.getElementById('cropSearchCount');
  if(countEl)countEl.textContent='';
  return;
}

items.forEach(item=>{
  const text=(item.getAttribute('data-search')||'').toLowerCase();
  const match=text.includes(cropSearchTerm);
  item.classList.toggle('hidden',!match);
  if(match)totalVisible++;
});
aanItems.forEach(item=>{
  const text=(item.getAttribute('data-search')||'').toLowerCase();
  const match=text.includes(cropSearchTerm);
  item.classList.toggle('hidden',!match);
  if(match)totalVisible++;
});

subsections.forEach(sub=>{
  const visItems=sub.querySelectorAll('.crop-item:not(.hidden), .crop-aan-item:not(.hidden)');
  const hasTables=sub.querySelectorAll('.crop-sla-table, .crop-threshold-table, .crop-esc-grid').length>0;
  const subText=(sub.getAttribute('data-search')||'').toLowerCase();
  const subMatch=subText.includes(cropSearchTerm);
  if(visItems.length>0||subMatch||(hasTables&&subText.includes(cropSearchTerm))){
    sub.classList.remove('hidden');
    const key=sub.getAttribute('data-crop-key');
    if(key&&!cropSubStates[key]){toggleCropSub(key)}
  } else {
    sub.classList.add('hidden');
  }
});

const countEl=document.getElementById('cropSearchCount');
if(countEl)countEl.textContent=totalVisible+' match'+(totalVisible!==1?'es':'');
}

function renderDashboard(){

const last30gpv=d.gpvData.slice(-30).reduce((s,v)=>s+v.value,0);
const last90gpv=d.gpvData.slice(-90).reduce((s,v)=>s+v.value,0);
const avgDaily=d.gpvData.reduce((s,v)=>s+v.value,0)/d.gpvData.length;
const first90avg=d.gpvData.slice(0,90).reduce((s,v)=>s+v.value,0)/90;
const last90avg=last90gpv/90;
const gpvChange=(last90avg-first90avg)/first90avg;
const gpvTrend=gpvChange>0.05?'↑':gpvChange<-0.05?'↓':'→';
const gpvTrendClass=gpvChange>0.05?'trend-up':gpvChange<-0.05?'trend-down':'trend-stable';
const projMonthly=avgDaily*30;

const last3cb=d.cbData.slice(-3);
const totalCB=last3cb.reduce((s,v)=>s+v.total,0);
const totalCBAmount=last3cb.reduce((s,v)=>s+v.amount,0);
const totalPayments3=last3cb.reduce((s,v)=>s+v.totalPayments,0);
const cbRate=totalPayments3>0?totalCB/totalPayments3:0;
const totalWon=last3cb.reduce((s,v)=>s+v.won,0);
const winRate=totalCB>0?totalWon/totalCB:0;
const cbRateClass=cbRate<0.01?'badge-green':cbRate<0.02?'badge-yellow':'badge-red';

const alerts=[];

  if(last30gpv/30<0.7*(last90gpv/90))alerts.push({type:'alert-yellow',text:'🟡 GPV DECLINE DETECTED'});
  if(loan.repayFrac<0.8*expectedFrac&&loan.status!=='closed')alerts.push({type:'alert-yellow',text:'🟡 REPAYMENT BEHIND SCHEDULE'});
  if(loan.outstanding>loan.receivables)alerts.push({type:'alert-red',text:'🔴 LOAN PAST DUE'});
} else {

  if(last30gpv/30<0.7*(last90gpv/90))alerts.push({type:'alert-yellow',text:'🟡 GPV DECLINE DETECTED'});

  projPayoffDown=addDays(new Date(),repaidPerDay>0?Math.ceil(loan.outstanding/(repaidPerDay*0.8)):Infinity);

function renderCharts(){
const d=currentData;
const hasLoans=d.hasActiveLoans&&d.loans.length>0;
const loan=hasLoans?d.loans[selectedLoanIdx]:null;
const chartOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8899aa',font:{family:'Inter',size:11}}},tooltip:{backgroundColor:'#1e2f40',titleColor:'#e8edf2',bodyColor:'#e8edf2',borderColor:'#2a3a4a',borderWidth:1,padding:10,titleFont:{family:'Inter',weight:'600'},bodyFont:{family:'Inter'}}},scales:{x:{ticks:{color:'#5a6a7a',font:{family:'Inter',size:10}},grid:{color:'rgba(42,58,74,0.4)'}},y:{ticks:{color:'#5a6a7a',font:{family:'Inter',size:10}},grid:{color:'rgba(42,58,74,0.4)'}}}};

if(hasLoans&&loan){
const donutCtx=document.getElementById('donutChart').getContext('2d');
const donutChart=new Chart(donutCtx,{type:'doughnut',data:{labels:['Repaid','Outstanding'],datasets:[{data:[loan.cumRepaid/100,loan.outstanding/100],backgroundColor:['#22c55e','#374151'],borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:true,cutout:'72%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt$(ctx.parsed)},backgroundColor:'#1e2f40',titleColor:'#e8edf2',bodyColor:'#e8edf2',borderColor:'#2a3a4a',borderWidth:1}},animation:{animateRotate:true,duration:1200}}});
charts.push(donutChart);

const repayCtx=document.getElementById('repayChart').getContext('2d');
const rng2=new SeededRNG(d.token+'repay'+selectedLoanIdx);
const repayLabels=[];const actualData=[];const expectedData=[];
const steps=Math.min(loan.daysAgo,60);
for(let i=0;i<=steps;i++){
const day=Math.round(i*loan.daysAgo/steps);repayLabels.push('Day '+day);
const expected=Math.min(1,day/loan.estDuration);expectedData.push(expected);
const noise=rng2.range(-0.03,0.03);
const actual=Math.min(loan.repayFrac,loan.repayFrac*(day/loan.daysAgo)+noise);
actualData.push(Math.max(0,Math.min(1,actual)));
}
actualData[actualData.length-1]=loan.repayFrac;
const repayChart=new Chart(repayCtx,{type:'line',data:{labels:repayLabels,datasets:[{label:'Actual Repayment',data:actualData,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,tension:0.3,pointRadius:0,pointHoverRadius:4,borderWidth:2},{label:'Expected (Linear)',data:expectedData,borderColor:'#6b7280',borderDash:[6,4],fill:false,tension:0,pointRadius:0,borderWidth:1.5}]},options:{...chartOpts,plugins:{...chartOpts.plugins,tooltip:{...chartOpts.plugins.tooltip,callbacks:{label:ctx=>ctx.dataset.label+': '+(ctx.parsed.y*100).toFixed(1)+'%'}}},scales:{...chartOpts.scales,y:{...chartOpts.scales.y,min:0,max:1,ticks:{...chartOpts.scales.y.ticks,callback:v=>(v*100)+'%'}}},animation:{duration:1500}}});
charts.push(repayChart);
}

const gpvCtx=document.getElementById('gpvChart').getContext('2d');
const gpvLabels=d.gpvData.map(g=>{const m=g.date.getMonth()+1;const dd=g.date.getDate();return m+'/'+dd});
const gpvValues=d.gpvData.map(g=>g.value);
const rollingAvg=[];const spikePoints=[];const dropPoints=[];
for(let i=0;i<gpvValues.length;i++){
if(i<29){rollingAvg.push(null);spikePoints.push(null);dropPoints.push(null);continue}
const avg=gpvValues.slice(i-29,i+1).reduce((s,v)=>s+v,0)/30;
rollingAvg.push(avg);
spikePoints.push(gpvValues[i]>2*avg?gpvValues[i]:null);
dropPoints.push(gpvValues[i]<0.5*avg?gpvValues[i]:null);
}
const gpvChart=new Chart(gpvCtx,{type:'line',data:{labels:gpvLabels,datasets:[{label:'Daily GPV',data:gpvValues,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.05)',fill:true,tension:0.2,pointRadius:0,pointHoverRadius:3,borderWidth:1.5},{label:'30-Day Avg',data:rollingAvg,borderColor:'#f97316',borderDash:[6,3],fill:false,tension:0.3,pointRadius:0,borderWidth:1.5},{label:'Spike',data:spikePoints,borderColor:'transparent',backgroundColor:'#ef4444',pointRadius:5,pointHoverRadius:7,showLine:false,type:'scatter'},{label:'Drop',data:dropPoints,borderColor:'transparent',backgroundColor:'#eab308',pointRadius:5,pointHoverRadius:7,showLine:false,type:'scatter'}]},options:{...chartOpts,plugins:{...chartOpts.plugins,tooltip:{...chartOpts.plugins.tooltip,callbacks:{label:ctx=>{if(ctx.dataset.label==='Spike')return'⚠️ Spike: '+fmt$(ctx.parsed.y);if(ctx.dataset.label==='Drop')return'⚠️ Drop: '+fmt$(ctx.parsed.y);return ctx.dataset.label+': '+fmt$(ctx.parsed.y)}}}},scales:{...chartOpts.scales,y:{...chartOpts.scales.y,ticks:{...chartOpts.scales.y.ticks,callback:v=>'$'+Math.round(v).toLocaleString()}}},animation:{duration:1500}}});
charts.push(gpvChart);

const cbCtx=document.getElementById('cbChart').getContext('2d');
const cbLabels=d.cbData.map(c=>{const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[c.month.getMonth()]+' '+c.month.getFullYear()});
const cbChart=new Chart(cbCtx,{type:'bar',data:{labels:cbLabels,datasets:[{label:'Won',data:d.cbData.map(c=>c.won),backgroundColor:'#22c55e',borderRadius:3},{label:'Lost',data:d.cbData.map(c=>c.lost),backgroundColor:'#ef4444',borderRadius:3},{label:'Pending',data:d.cbData.map(c=>c.pending),backgroundColor:'#eab308',borderRadius:3}]},options:{...chartOpts,plugins:{...chartOpts.plugins},scales:{...chartOpts.scales,x:{...chartOpts.scales.x,stacked:true},y:{...chartOpts.scales.y,stacked:true,beginAtZero:true,ticks:{...chartOpts.scales.y.ticks,stepSize:1}}},animation:{duration:1200}}});
charts.push(cbChart);
}

function copyReport(){
if(!currentData)return;
const d=currentData;
const hasLoans=d.hasActiveLoans&&d.loans.length>0;
const loan=hasLoans?d.loans[selectedLoanIdx]:null;
const last30gpv=d.gpvData.slice(-30).reduce((s,v)=>s+v.value,0);
const avgDaily=d.gpvData.reduce((s,v)=>s+v.value,0)/d.gpvData.length;
const last3cb=d.cbData.slice(-3);
const totalCB=last3cb.reduce((s,v)=>s+v.total,0);
const totalPayments3=last3cb.reduce((s,v)=>s+v.totalPayments,0);
const cbRate=totalPayments3>0?totalCB/totalPayments3:0;

let loanReport='';
if(hasLoans&&loan){
const repaidPerDay=loan.daysAgo>0?loan.cumRepaid/loan.daysAgo:0;
const daysToPayoff=repaidPerDay>0?Math.ceil(loan.outstanding/repaidPerDay):Infinity;
loanReport=`\nSELECTED LOAN: ${loan.planId}\nStatus: ${loan.status.toUpperCase()}\nFinanced: ${fmt$(loan.financed/100)}\nReceivables: ${fmt$(loan.receivables/100)}\nRepaid: ${fmt$(loan.cumRepaid/100)} (${fmtPct(loan.repayFrac)})\nOutstanding: ${fmt$(loan.outstanding/100)}\nHold Rate: ${(loan.holdRate/10000*100).toFixed(2)}%\nRepayment Pace: ${fmt$(repaidPerDay/100)}/day\nProjected Payoff: ${daysToPayoff<9999?fmtDate(addDays(new Date(),daysToPayoff)):'N/A'}`;
} else {
loanReport=`\nACTIVE LOANS: None\nLOAN ELIGIBILITY: ${d.eligibility.failedCount} of ${d.eligibility.totalRules} checks failed`;
for(const [catName,catData] of Object.entries(d.eligibility.results)){
const failed=catData.rules.filter(r=>!r.passed);
if(failed.length>0){loanReport+='\n  '+catName+':';failed.forEach(r=>{loanReport+='\n    ✗ '+r.key+': '+r.desc})}
}
}

let linkedReport='';
if(d.linkedAccounts.length>0){
linkedReport='\nLINKED ACCOUNTS WITH ACTIVE LOANS\n';
d.linkedAccounts.forEach(la=>{linkedReport+='  Unit Token: '+la.unitToken+' | '+la.businessName+' | Loans: '+la.activeLoanCount+' | Financed: '+fmt$(la.totalFinanced/100)+' | Risk: '+la.risk+'\n'});
} else {linkedReport='\nLINKED ACCOUNTS: None with active loans\n'}

const report=`FLEX LOAN MANAGER — MERCHANT REPORT\n====================================\nMerchant: ${d.merchantName}\nUnit Token: ${d.token}\nRisk Grade: ${d.risk}\nStatus: ${d.isActive?'ACTIVE':'INACTIVE'}\nCategory: ${d.category}\nDays Active: ${d.daysActive}\n${linkedReport}${loanReport}\n\nGPV SUMMARY\nLast 30 Days: ${fmt$(last30gpv)}\nAvg Daily: ${fmt$(avgDaily)}\n\nCHARGEBACKS (90d)\nCount: ${totalCB}\nRate: ${fmtPct(cbRate)}\n\nGenerated: ${new Date().toISOString()}`;

navigator.clipboard.writeText(report).then(()=>{
const btn=document.getElementById('copyBtn');
btn.innerHTML='<i class="fas fa-check"></i> Copied!';
btn.classList.remove('btn-secondary');btn.classList.add('btn-success');
setTimeout(()=>{btn.innerHTML='<i class="fas fa-copy"></i> Copy Report';btn.classList.remove('btn-success');btn.classList.add('btn-secondary')},2000);
}).catch(()=>{alert('Failed to copy. Please try again.')});
}

document.getElementById('tokenInput').value='MLXBYSKMVA9NJ';
</script>
