# Flex Loan Manager Bot — Internal Tool

## Overview
An internal operations tool for Square Capital teams to look up a merchant by their **Unit Token** and view a comprehensive dashboard of their Flex Loan performance, GPV trends, repayment progress, risk grade, business health signals, loan eligibility, and linked accounts.

## Design
- Dark professional theme with a modern dashboard feel (dark navy/charcoal background, accent colors for status)
- Clean card-based layout with clear sections
- Charts using Chart.js for GPV trends and repayment progress
- Responsive layout

## Layout & Sections (in order)

### Header
- Title: "Flex Loan Manager Bot" with Square Capital branding
- Subtitle: "Internal Operations Tool"
- Search bar: Large prominent input for **Unit Token** with a "Look Up" button
- Loading spinner when fetching data

### Mock Data
Realistic mock data generated deterministically from token string via seeded PRNG. ~75% of tokens have active loans; ~25% have no active offer (triggering eligibility view).

### Section 1: Merchant Overview (top row of cards)
- Merchant Name, Unit Token, Risk Grade (colored badge), Merchant Status, Business Category, Days Since Activation, Country

### Section 2: Active Flex Loans (table) — MOVED TO TOP
- Table showing all active flex loans immediately after Merchant Overview
- Columns: Plan Group ID, Status, Financed, Fee, Receivables, Hold Rate, Risk, Activated, Origination
- Color-coded status badges
- Clicking a row selects it and updates Repayment Progress below
- If NO active loans exist, shows "No Active Flex Loans" message and directs to Loan Eligibility section

### Section 3: Loan Eligibility (NEW — shown when NO active offer)
- Appears only when the merchant has no active Flex Loan offer
- Shows a comprehensive checklist of 44 eligibility rules organized into 6 categories
- Summary header: "X of 44 eligibility checks failed" with red/green indicator
- Toggle between "Failed Only" (default) and "All Checks" views
- Collapsible category groups with pass/fail counts per category
- Categories with failures auto-expand; others start collapsed

**Categories and Rules:**
1. **Account Standing** (7 rules): account_deleted, not_activated, customer_is_blacklisted, compliance_hashtag_violation_eligibility, frozen, frozen_recently, suspected
2. **Processing Activity** (9 rules): trailing year active days/payments/amounts, annualized sales, recent activity checks, processing time minimums, card diversity
3. **Business Health Slumps** (4 rules): payment amount/count/active days slumps, weekly sales threshold
4. **Chargeback & Disputes** (4 rules): chargeback amounts (12wk/1yr), count limits, active reserves
5. **Existing Loan Status** (11 rules): past due, written off, breached, transferred, canceled, declined, prepayment activity, MPO eligibility, outstanding applications
6. **Business Type & Limits** (9 rules): blacklisted/blocked types, ineligible states, payment limits, offer amount limits, sales projections, hold rate validation, risk score limits

Each rule shows: pass (green check) or fail (red X), rule key (monospace), human-readable description.
Mock data: 1-4 randomly failed rules when no active loans.

### Section 4: Linked Accounts with Active Loans
- Table of linked unit tokens with clickable navigation
- Shows business name, location, active loan count, total financed, status, risk grade
- 0-3 linked accounts per token

### Section 5: Repayment Progress (selected loan — only shown with active loans)
- Donut chart + repayment curve line chart
- Key metrics: Total Receivables, Cumulative Repaid, Outstanding, Repayment Fraction, Days Active, Est. Duration, Projected Payoff

### Section 6: GPV Trends
- Daily GPV line chart (180 days) with 30-day rolling average
- Anomaly highlighting (spikes/drops)
- Summary cards: Last 30/90 Days GPV, Avg Daily, Trend, Projected Monthly

### Section 7: Business Health Signals
- Alert flags (colored banners) — includes "NO ACTIVE OFFER" alert when applicable
- Chargeback summary cards and monthly stacked bar chart

### Section 8: Projected Loan Payoff (only shown with active loans)
- Repayment pace, projected payoff dates (current, +10%, -20%)
- Visual timeline progress bar

## Interactions
- Token lookup generates all mock data and renders full dashboard
- Clicking linked account loads that account's dashboard
- Clicking loan row updates Repayment Progress
- Eligibility toggle switches between Failed Only / All Checks views
- Category headers collapse/expand rule lists
- Copy Report includes eligibility failures when no active loans
- All charts animate on load with hover tooltips

## Technical Notes
- Chart.js (CDN) for all charts
- Seeded PRNG for deterministic data
- Entirely client-side, no backend
- Font Awesome icons, Inter font from Google Fonts

// Seeded PRNG
class SeededRNG{constructor(s){this.seed=this.hashStr(s)}hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return Math.abs(h)||1}next(){this.seed^=this.seed<<13;this.seed^=this.seed>>17;this.seed^=this.seed<<5;return(this.seed>>>0)/4294967296}range(a,b){return a+this.next()*(b-a)}int(a,b){return Math.floor(this.range(a,b+1))}pick(arr){return arr[this.int(0,arr.length-1)]}shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=this.int(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}}

const fmt$=(v)=>'$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct=(v)=>(v*100).toFixed(2)+'%';
const fmtDate=(d)=>{const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[d.getMonth()]+' '+String(d.getDate()).padStart(2,'0')+', '+d.getFullYear()};
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const daysBetween=(a,b)=>Math.round((b-a)/(86400000));

let charts=[];
function destroyCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[]}

const firstNames=['Sunrise','Golden','Pacific','Metro','Harbor','Summit','Valley','River','Crown','Atlas','Maple','Cedar','Silver','Iron','Copper','Jade','Coral','Azure','Ember','Sage'];
const lastNames=['Bakery','Bistro','Café','Deli','Kitchen','Market','Boutique','Studio','Workshop','Goods','Supply','Trading','Provisions','Mercantile','Emporium','Collective','Co','Shop','House','Place'];
const categories=['Food & Beverage','Retail','Health & Beauty','Professional Services','Home & Repair','Entertainment','Fitness & Wellness','Automotive','Education','Technology'];
const statuses=['originated','allocated','originated','allocated','closed','originated'];
const origTypes=['flex_loan','flex_loan_plus','flex_loan'];
const locationSuffixes=['Main St','Downtown','Westside','East Branch','North Plaza','South Center','Airport','Mall Location','Flagship','Express'];

// ========== ELIGIBILITY RULES ==========

'Account Standing': {

    {key:'frozen', desc:'The merchant is currently frozen.'},

  ]
},
'Processing Activity': {

    {key:'trailing_one_year_active_day_count_less_than_minimum', desc:'Fewer than 20 active days in the last year.'},

function getAllRuleKeys(){
const keys=[];
for(const cat of Object.values(ELIGIBILITY_RULES)){
  for(const rule of cat.rules){keys.push(rule.key)}
}
return keys;
}

function generateEligibilityData(token, hasActiveLoans){
const r=new SeededRNG(token+'_eligibility_v3');
const allKeys=getAllRuleKeys();
const failedKeys=new Set();
if(!hasActiveLoans){
  const numFails=r.int(1,4);
  const shuffled=r.shuffle([...allKeys]);
  for(let i=0;i<numFails;i++){failedKeys.add(shuffled[i])}
}
const results={};
for(const [catName,catData] of Object.entries(ELIGIBILITY_RULES)){
  results[catName]={icon:catData.icon,cssClass:catData.cssClass,rules:[]};
  for(const rule of catData.rules){
    results[catName].rules.push({key:rule.key,desc:rule.desc,passed:!failedKeys.has(rule.key)});
  }
}
return {results,totalRules:allKeys.length,failedCount:failedKeys.size};
}

function generateLinkedToken(rng){
const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
let token='';
for(let i=0;i<13;i++){token+=chars[rng.int(0,chars.length-1)]}
return token;
}

function generateLinkedAccounts(token){
const r=new SeededRNG(token+'_linked_accounts_v2');
const numLinked=r.int(0,3);
const linked=[];
for(let i=0;i<numLinked;i++){
const linkedToken=generateLinkedToken(r);
if(linkedToken===token)continue;
const lr=new SeededRNG(linkedToken);
const bizName=lr.pick(firstNames)+' '+lr.pick(lastNames);
const locationName=bizName+' — '+r.pick(locationSuffixes);
const numActiveLoans=r.int(1,3);
let totalFinanced=0;
const loanStatuses=[];
for(let j=0;j<numActiveLoans;j++){
totalFinanced+=r.int(5000,100000)*100;
loanStatuses.push(r.pick(['originated','allocated']));
}
const riskGrades=['A','A','B','B','B','C','C','D'];
const risk=r.pick(riskGrades);
const primaryStatus=loanStatuses[0];
linked.push({unitToken:linkedToken,businessName:bizName,locationName:locationName,activeLoanCount:numActiveLoans,totalFinanced:totalFinanced,status:primaryStatus,risk:risk});
}
return linked;
}

function generateData(token){
const r=new SeededRNG(token);
const merchantName=r.pick(firstNames)+' '+r.pick(lastNames);
const riskGrades=['A','A','B','B','B','C','C','D','F'];
const merchantRisk=r.pick(riskGrades);
const isActive=r.next()>0.1;
const category=r.pick(categories);
const daysActive=r.int(120,1800);
const activationDate=addDays(new Date(),-daysActive);

// Determine if this merchant has active loans (some don't — for eligibility demo)
const hasActiveOfferRoll=r.next();
const hasActiveLoans=hasActiveOfferRoll>0.25; // 75% have active loans, 25% don't

const numLoans=hasActiveLoans?r.int(1,4):0;
const loans=[];
for(let i=0;i<numLoans;i++){
const financed=r.int(5000,100000)*100;
const feeRate=r.range(0.05,0.15);
const fee=Math.round(financed*feeRate);
const receivables=financed+fee;
const holdRate=r.int(500,2000);
const loanRisk=r.pick(['A','B','B','C','C','D']);
const loanStatus=i===0?r.pick(['originated','allocated']):r.pick(statuses);
const loanDaysAgo=r.int(30,Math.min(daysActive,600));
const loanActivated=addDays(new Date(),-loanDaysAgo);
const repayFrac=loanStatus==='closed'?1:r.range(0.1,0.85);
const cumRepaid=Math.round(receivables*repayFrac);
const estDuration=r.int(180,540);
const planId='PG'+token.substring(0,4)+r.int(1000,9999);
loans.push({planId,status:loanStatus,financed,fee,receivables,holdRate,risk:loanRisk,activated:loanActivated,daysAgo:loanDaysAgo,origType:r.pick(origTypes),repayFrac,cumRepaid,outstanding:receivables-cumRepaid,estDuration});
}

// GPV data (180 days)
const baseGPV=r.range(500,5000);
const gpvData=[];
const today=new Date();
for(let i=179;i>=0;i--){
const date=addDays(today,-i);
const seasonal=1+0.2*Math.sin((i/30)*Math.PI);
const trend=1+(r.next()-0.48)*0.02;
const noise=r.range(0.4,1.8);
const val=Math.max(0,baseGPV*seasonal*trend*noise);
gpvData.push({date,value:val});
}

// Chargebacks (12 months)
const cbData=[];
const baseRate=r.range(0.003,0.035);
for(let i=11;i>=0;i--){
const month=new Date(today.getFullYear(),today.getMonth()-i,1);
const totalPayments=r.int(80,400);
const cbCount=Math.max(0,Math.round(totalPayments*baseRate*r.range(0.3,2.5)));
const won=Math.round(cbCount*r.range(0.3,0.7));
const lost=Math.round((cbCount-won)*r.range(0.4,0.8));
const pending=cbCount-won-lost;
const avgAmount=r.range(20,200);
cbData.push({month,total:cbCount,won:Math.max(0,won),lost:Math.max(0,lost),pending:Math.max(0,pending),amount:cbCount*avgAmount,totalPayments});
}

const linkedAccounts=generateLinkedAccounts(token);
const eligibility=generateEligibilityData(token,hasActiveLoans);

return{merchantName,token,risk:merchantRisk,isActive,category,daysActive,activationDate,loans,gpvData,cbData,linkedAccounts,hasActiveLoans,eligibility};
}

        </div>

    }
  }

  html+=`</div></div>`;
}

el.innerHTML=html;
}

const last90gpv=d.gpvData.slice(-90).reduce((s,v)=>s+v.value,0);
const avgDaily=d.gpvData.reduce((s,v)=>s+v.value,0)/d.gpvData.length;
const first90avg=d.gpvData.slice(0,90).reduce((s,v)=>s+v.value,0)/90;
const last90avg=last90gpv/90;
const gpvChange=(last90avg-first90avg)/first90avg;
const gpvTrend=gpvChange>0.05?'↑':gpvChange<-0.05?'↓':'→';
const gpvTrendClass=gpvChange>0.05?'trend-up':gpvChange<-0.05?'trend-down':'trend-stable';
const projMonthly=avgDaily*30;

const totalCBAmount=last3cb.reduce((s,v)=>s+v.amount,0);
const totalPayments3=last3cb.reduce((s,v)=>s+v.totalPayments,0);
const cbRate=totalPayments3>0?totalCB/totalPayments3:0;
const totalWon=last3cb.reduce((s,v)=>s+v.won,0);

<div class="metric-card"><div class="label">Total Receivables</div><div class="value">${fmt$(loan.receivables/100)}</div></div>

<div class="metric-card"><div class="label">Repayment Fraction</div><div class="value">${fmtPct(loan.repayFrac)}</div></div>
<div class="metric-card"><div class="label">Days Active</div><div class="value">${loan.daysAgo}</div></div>
<div class="metric-card"><div class="label">Est. Duration</div><div class="value">${loan.estDuration}d</div></div>
<div class="metric-card"><div class="label">Projected Payoff</div><div class="value" style="font-size:13px">${daysToPayoff<9999?fmtDate(projPayoff):'N/A'}</div></div>
</div>
</div>`;
}

// Section: GPV Trends
html+=`
<div class="section fade-in">
<div class="section-title"><i class="fas fa-chart-line"></i> GPV Trends (Last 180 Days)</div>
<div class="chart-container"><canvas id="gpvChart" height="280"></canvas></div>
<div class="cards-row cards-5" style="margin-top:14px">

<div class="card"><div class="card-label">GPV Trend</div><div class="card-value small ${gpvTrendClass}">${gpvTrend} ${(gpvChange*100).toFixed(1)}%</div></div>

// Section: Business Health Signals
html+=`
<div class="section fade-in">

<div class="alerts-container">${alerts.map(a=>`<div class="alert-banner ${a.type}">${a.text}</div>`).join('')}</div>

</div>
<div class="chart-container"><canvas id="cbChart" height="240"></canvas></div>
</div>`;

// Section: Projected Loan Payoff (only if loans exist)
if(hasLoans&&loan){
html+=`
<div class="section fade-in">

<div class="projection-card">

<div class="proj-row"><span class="proj-label">If GPV +10%</span><span class="proj-value" style="color:var(--accent-green)">${daysToPayoff<9999?fmtDate(projPayoffUp):'N/A'}</span></div>

// Render eligibility section if no active loans

function selectLoan(i){selectedLoanIdx=i;destroyCharts();renderDashboard()}

function renderCharts(){
const d=currentData;
const hasLoans=d.hasActiveLoans&&d.loans.length>0;
const loan=hasLoans?d.loans[selectedLoanIdx]:null;
const chartOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8899aa',font:{family:'Inter',size:11}}},tooltip:{backgroundColor:'#1e2f40',titleColor:'#e8edf2',bodyColor:'#e8edf2',borderColor:'#2a3a4a',borderWidth:1,padding:10,titleFont:{family:'Inter',weight:'600'},bodyFont:{family:'Inter'}}},scales:{x:{ticks:{color:'#5a6a7a',font:{family:'Inter',size:10}},grid:{color:'rgba(42,58,74,0.4)'}},y:{ticks:{color:'#5a6a7a',font:{family:'Inter',size:10}},grid:{color:'rgba(42,58,74,0.4)'}}}};

if(hasLoans&&loan){
// Donut Chart
const donutCtx=document.getElementById('donutChart').getContext('2d');
const donutChart=new Chart(donutCtx,{type:'doughnut',data:{labels:['Repaid','Outstanding'],datasets:[{data:[loan.cumRepaid/100,loan.outstanding/100],backgroundColor:['#22c55e','#374151'],borderWidth:0,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:true,cutout:'72%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmt$(ctx.parsed)},backgroundColor:'#1e2f40',titleColor:'#e8edf2',bodyColor:'#e8edf2',borderColor:'#2a3a4a',borderWidth:1}},animation:{animateRotate:true,duration:1200}}});
charts.push(donutChart);

// Repayment Curve
const repayCtx=document.getElementById('repayChart').getContext('2d');
const rng2=new SeededRNG(d.token+'repay'+selectedLoanIdx);
const repayLabels=[];const actualData=[];const expectedData=[];
const steps=Math.min(loan.daysAgo,60);
for(let i=0;i<=steps;i++){
const day=Math.round(i*loan.daysAgo/steps);
repayLabels.push('Day '+day);
const expected=Math.min(1,day/loan.estDuration);
expectedData.push(expected);
const noise=rng2.range(-0.03,0.03);
const actual=Math.min(loan.repayFrac,loan.repayFrac*(day/loan.daysAgo)+noise);
actualData.push(Math.max(0,Math.min(1,actual)));
}
actualData[actualData.length-1]=loan.repayFrac;
const repayChart=new Chart(repayCtx,{type:'line',data:{labels:repayLabels,datasets:[{label:'Actual Repayment',data:actualData,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.1)',fill:true,tension:0.3,pointRadius:0,pointHoverRadius:4,borderWidth:2},{label:'Expected (Linear)',data:expectedData,borderColor:'#6b7280',borderDash:[6,4],fill:false,tension:0,pointRadius:0,borderWidth:1.5}]},options:{...chartOpts,plugins:{...chartOpts.plugins,tooltip:{...chartOpts.plugins.tooltip,callbacks:{label:ctx=>ctx.dataset.label+': '+(ctx.parsed.y*100).toFixed(1)+'%'}}},scales:{...chartOpts.scales,y:{...chartOpts.scales.y,min:0,max:1,ticks:{...chartOpts.scales.y.ticks,callback:v=>(v*100)+'%'}}},animation:{duration:1500}}});
charts.push(repayChart);
}

// GPV Chart
const gpvCtx=document.getElementById('gpvChart').getContext('2d');
const gpvLabels=d.gpvData.map(g=>{const m=g.date.getMonth()+1;const dd=g.date.getDate();return m+'/'+dd});
const gpvValues=d.gpvData.map(g=>g.value);
const rollingAvg=[];const spikePoints=[];const dropPoints=[];
for(let i=0;i<gpvValues.length;i++){
if(i<29){rollingAvg.push(null);spikePoints.push(null);dropPoints.push(null);continue}
const avg=gpvValues.slice(i-29,i+1).reduce((s,v)=>s+v,0)/30;
rollingAvg.push(avg);
spikePoints.push(gpvValues[i]>2*avg?gpvValues[i]:null);
dropPoints.push(gpvValues[i]<0.5*avg?gpvValues[i]:null);
}
const gpvChart=new Chart(gpvCtx,{type:'line',data:{labels:gpvLabels,datasets:[{label:'Daily GPV',data:gpvValues,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.05)',fill:true,tension:0.2,pointRadius:0,pointHoverRadius:3,borderWidth:1.5},{label:'30-Day Avg',data:rollingAvg,borderColor:'#f97316',borderDash:[6,3],fill:false,tension:0.3,pointRadius:0,borderWidth:1.5},{label:'Spike',data:spikePoints,borderColor:'transparent',backgroundColor:'#ef4444',pointRadius:5,pointHoverRadius:7,showLine:false,type:'scatter'},{label:'Drop',data:dropPoints,borderColor:'transparent',backgroundColor:'#eab308',pointRadius:5,pointHoverRadius:7,showLine:false,type:'scatter'}]},options:{...chartOpts,plugins:{...chartOpts.plugins,tooltip:{...chartOpts.plugins.tooltip,callbacks:{label:ctx=>{if(ctx.dataset.label==='Spike')return'⚠️ Spike: '+fmt$(ctx.parsed.y);if(ctx.dataset.label==='Drop')return'⚠️ Drop: '+fmt$(ctx.parsed.y);return ctx.dataset.label+': '+fmt$(ctx.parsed.y)}}}},scales:{...chartOpts.scales,y:{...chartOpts.scales.y,ticks:{...chartOpts.scales.y.ticks,callback:v=>'$'+Math.round(v).toLocaleString()}}},animation:{duration:1500}}});
charts.push(gpvChart);

// Chargeback Chart
const cbCtx=document.getElementById('cbChart').getContext('2d');
const cbLabels=d.cbData.map(c=>{const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return m[c.month.getMonth()]+' '+c.month.getFullYear()});
const cbChart=new Chart(cbCtx,{type:'bar',data:{labels:cbLabels,datasets:[{label:'Won',data:d.cbData.map(c=>c.won),backgroundColor:'#22c55e',borderRadius:3},{label:'Lost',data:d.cbData.map(c=>c.lost),backgroundColor:'#ef4444',borderRadius:3},{label:'Pending',data:d.cbData.map(c=>c.pending),backgroundColor:'#eab308',borderRadius:3}]},options:{...chartOpts,plugins:{...chartOpts.plugins},scales:{...chartOpts.scales,x:{...chartOpts.scales.x,stacked:true},y:{...chartOpts.scales.y,stacked:true,beginAtZero:true,ticks:{...chartOpts.scales.y.ticks,stepSize:1}}},animation:{duration:1200}}});
charts.push(cbChart);
}

function copyReport(){
if(!currentData)return;
const d=currentData;
const hasLoans=d.hasActiveLoans&&d.loans.length>0;
const loan=hasLoans?d.loans[selectedLoanIdx]:null;
const last30gpv=d.gpvData.slice(-30).reduce((s,v)=>s+v.value,0);
const avgDaily=d.gpvData.reduce((s,v)=>s+v.value,0)/d.gpvData.length;
const last3cb=d.cbData.slice(-3);
const totalCB=last3cb.reduce((s,v)=>s+v.total,0);
const totalPayments3=last3cb.reduce((s,v)=>s+v.totalPayments,0);
const cbRate=totalPayments3>0?totalCB/totalPayments3:0;

let loanReport='';
if(hasLoans&&loan){
  const repaidPerDay=loan.daysAgo>0?loan.cumRepaid/loan.daysAgo:0;
  const daysToPayoff=repaidPerDay>0?Math.ceil(loan.outstanding/repaidPerDay):Infinity;
  loanReport=`
SELECTED LOAN: ${loan.planId}
Status: ${loan.status.toUpperCase()}
Financed: ${fmt$(loan.financed/100)}
Receivables: ${fmt$(loan.receivables/100)}
Repaid: ${fmt$(loan.cumRepaid/100)} (${fmtPct(loan.repayFrac)})
Outstanding: ${fmt$(loan.outstanding/100)}
Hold Rate: ${(loan.holdRate/10000*100).toFixed(2)}%
Repayment Pace: ${fmt$(repaidPerDay/100)}/day
Projected Payoff: ${daysToPayoff<9999?fmtDate(addDays(new Date(),daysToPayoff)):'N/A'}`;
} else {
  loanReport=`
ACTIVE LOANS: None
LOAN ELIGIBILITY: ${d.eligibility.failedCount} of ${d.eligibility.totalRules} checks failed`;
  for(const [catName,catData] of Object.entries(d.eligibility.results)){
    const failed=catData.rules.filter(r=>!r.passed);
    if(failed.length>0){
      loanReport+='\n  '+catName+':';
      failed.forEach(r=>{loanReport+='\n    ✗ '+r.key+': '+r.desc});
    }
  }
}

let linkedReport='';
if(d.linkedAccounts.length>0){
linkedReport='\nLINKED ACCOUNTS WITH ACTIVE LOANS\n';
d.linkedAccounts.forEach(la=>{
linkedReport+='  Unit Token: '+la.unitToken+' | '+la.businessName+' | Loans: '+la.activeLoanCount+' | Financed: '+fmt$(la.totalFinanced/100)+' | Risk: '+la.risk+'\n';
});
} else {
linkedReport='\nLINKED ACCOUNTS: None with active loans\n';
}

const report=`FLEX LOAN MANAGER — MERCHANT REPORT
====================================
Merchant: ${d.merchantName}
Unit Token: ${d.token}
Risk Grade: ${d.risk}
Status: ${d.isActive?'ACTIVE':'INACTIVE'}
Category: ${d.category}
Days Active: ${d.daysActive}
${linkedReport}${loanReport}

GPV SUMMARY
Last 30 Days: ${fmt$(last30gpv)}
Avg Daily: ${fmt$(avgDaily)}

CHARGEBACKS (90d)
Count: ${totalCB}
Rate: ${fmtPct(cbRate)}

Generated: ${new Date().toISOString()}`;

navigator.clipboard.writeText(report).then(()=>{
const btn=document.getElementById('copyBtn');
btn.innerHTML='<i class="fas fa-check"></i> Copied!';
btn.classList.remove('btn-secondary');btn.classList.add('btn-success');
setTimeout(()=>{btn.innerHTML='<i class="fas fa-copy"></i> Copy Report';btn.classList.remove('btn-success');btn.classList.add('btn-secondary')},2000);
}).catch(()=>{alert('Failed to copy. Please try again.')});
}

// Pre-fill demo token
document.getElementById('tokenInput').value='MLXBYSKMVA9NJ';
</script>
